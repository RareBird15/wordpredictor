name = wordPredictor
summary = Proactive word prediction for NVDA users
description = Watches what you type and predicts the next word using n-gram analysis. Predictions are announced through NVDA's speech engine and can be accepted with NVDA+Control+number keys (1 through 0). Learns from your writing over time. Includes partial-word prediction, terminal auto-detection, a custom app exclusion list, and a settings panel.
author = Lanie Carmelo-Molinar
url = https://lanie.work
version = 1.0.0
